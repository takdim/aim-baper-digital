{% extends "base.html" %}

{% block title %}Daftar - BAPER Digital{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <h2 class="card-title text-center mb-4">
                    <i class="bi bi-person-plus"></i> Daftar
                </h2>
                <p class="text-center text-muted mb-4">Buat akun baru untuk mengakses BAPER Digital</p>
                
                <form method="POST" action="{{ url_for('auth.register') }}">
                    <div class="mb-3">
                        <label for="nim" class="form-label">NIM</label>
                        <input type="text" class="form-control form-control-lg" id="nim" name="nim" 
                               placeholder="Masukkan NIM Anda" required>
                        <small class="text-muted">NIM harus unik</small>
                    </div>
                    
                    <div class="mb-3">
                        <label for="name" class="form-label">Nama Lengkap</label>
                        <input type="text" class="form-control form-control-lg" id="name" name="name" 
                               placeholder="Masukkan nama lengkap" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="faculty" class="form-label">Fakultas</label>
                        <select class="form-select form-select-lg" id="faculty" name="faculty" required>
                            <option value="">-- Pilih Fakultas --</option>
                            <option value="Teknik Informatika">Teknik Informatika</option>
                            <option value="Teknik Industri">Teknik Industri</option>
                            <option value="Teknik Mesin">Teknik Mesin</option>
                            <option value="Teknik Sipil">Teknik Sipil</option>
                            <option value="Ekonomi">Ekonomi</option>
                            <option value="Bisnis">Bisnis</option>
                            <option value="Hukum">Hukum</option>
                            <option value="Humaniora">Humaniora</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" 
                               placeholder="Minimal 6 karakter" required minlength="6">
                    </div>
                    
                    <div class="mb-3">
                        <label for="password_confirm" class="form-label">Konfirmasi Password</label>
                        <input type="password" class="form-control form-control-lg" id="password_confirm" 
                               name="password_confirm" placeholder="Ulangi password" required minlength="6">
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        <i class="bi bi-person-plus"></i> Daftar
                    </button>
                </form>
                
                <hr class="my-4">
                
                <p class="text-center mb-0">
                    Sudah punya akun? 
                    <a href="{{ url_for('auth.login') }}" class="text-decoration-none">
                        Login sekarang
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>

<style>
    .card {
        border-radius: 0.5rem;
    }
    
    .form-control:focus,
    .form-select:focus {
        border-color: var(--secondary-color);
        box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
    }
    
    .btn-primary:hover {
        background-color: #2980b9;
        border-color: #2980b9;
    }
</style>
{% endblock %}
